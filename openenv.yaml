spec_version: 1

# ---------------------------------------------------------------------------
# Environment identity
# ---------------------------------------------------------------------------
name:        aiops-incident-response
version:     "0.1.0"
description: >
  AIOps Incident Response Environment — a multi-step on-call engineering
  environment where an AI agent acts as a senior Site Reliability Engineer
  responding to production incidents. The agent investigates service logs and
  metrics, identifies root causes, applies targeted remediations, and verifies
  recovery. Every task models a real incident pattern documented in SRE
  literature: connection pool exhaustion (easy), cache stampede + missing DB
  index (medium), and a three-way cascade of message queue disk saturation,
  service OOM crash-loop, and database deadlock (hard).

# ---------------------------------------------------------------------------
# Runtime
# ---------------------------------------------------------------------------
type:    space
runtime: fastapi
app:     server.app:app
port:    7860

# ---------------------------------------------------------------------------
# Hardware (CPU-only — no GPU required)
# ---------------------------------------------------------------------------
hardware_tier: cpu-upgrade

# ---------------------------------------------------------------------------
# Concurrency
# ---------------------------------------------------------------------------
max_concurrent_envs: 4

# ---------------------------------------------------------------------------
# Tasks
# ---------------------------------------------------------------------------
tasks:
  - id:          easy
    description: >
      Payment Service Checkout Failures — single root cause: the application
      database (user_db) connection pool is exhausted after a flash-sale traffic
      spike (10/10 connections in use, 47 queries waiting). The agent must
      view_logs(payment_service) to observe DB timeout errors, view_metrics
      (user_db, connections) to confirm pool saturation, then apply_fix to
      increase max_connections, and verify the payment service recovers.
      3 services | 1 root cause | 15 step budget.
    difficulty:  easy
    max_steps:   15
    grader:      programmatic
    score_range: [0.0, 1.0]
    grader_formula: >
      score = 0.35 × root_cause_ratio     (root_causes_found / 1)
            + 0.25 × service_health_ratio  (services_healthy / 3)
            + 0.20 × normalised_reward     (cumulative_reward / steps_taken)
            + 0.20 × completion_bonus      (1.0 if all fixed, 0.5 if partial)

  - id:          medium
    description: >
      Product Catalog Degradation — two concurrent root causes triggered by a
      single bad deployment: (1) Redis cache TTL was set to 0, causing 100%
      cache miss rate and a stampede on the product DB; (2) a database migration
      dropped the idx_category index, causing full 4.2 M-row table scans.
      The agent must investigate catalog_service logs, Redis hit rate metrics,
      and product_db slow-query metrics to identify both root causes and apply
      two separate fixes. 5 services | 2 root causes | 25 step budget.
    difficulty:  medium
    max_steps:   25
    grader:      programmatic
    score_range: [0.0, 1.0]
    grader_formula: >
      score = 0.35 × root_cause_ratio     (root_causes_found / 2)
            + 0.25 × service_health_ratio  (services_healthy / 5)
            + 0.20 × normalised_reward
            + 0.20 × completion_bonus

  - id:          hard
    description: >
      Order Processing System P0 — three simultaneous independent failures
      cascade into a complete order pipeline outage: (1) RabbitMQ disk full
      (7-day retention with no cleanup filled the 60 GB disk, blocking all
      producers); (2) order-service crash-loop (v3.1.0 introduced an unbounded
      static cache causing OOM in < 4 min); (3) inventory DB deadlock (nightly
      reporting job holding LOCK TABLES WRITE for 30 min). The agent must
      identify each root cause independently, determine fix dependency order,
      and apply all three remediations. 7 services | 3 root causes | 40 steps.
    difficulty:  hard
    max_steps:   40
    grader:      programmatic
    score_range: [0.0, 1.0]
    grader_formula: >
      score = 0.35 × root_cause_ratio     (root_causes_found / 3)
            + 0.25 × service_health_ratio  (services_healthy / 7)
            + 0.20 × normalised_reward
            + 0.20 × completion_bonus

# ---------------------------------------------------------------------------
# Environment variables (declared for HF Spaces secrets UI)
# ---------------------------------------------------------------------------
env:
  API_BASE_URL:
    description: "OpenAI-compatible LLM API base URL (default: https://api.openai.com/v1)"
    required: false
    default: "https://api.openai.com/v1"
  MODEL_NAME:
    description: "LLM model identifier (default: gpt-4o-mini)"
    required: false
    default: "gpt-4o-mini"
  HF_TOKEN:
    description: "Bearer token / API key for the LLM inference endpoint (set via HF Spaces secrets)"
    required: true
  OPENENV_ENDPOINT:
    description: "Base URL of this environment server (default: http://localhost:7860)"
    required: false
    default: "http://localhost:7860"
  WORKERS:
    description: "Uvicorn worker count (default: 1)"
    required: false
    default: "1"
