spec_version: 1

# ---------------------------------------------------------------------------
# Environment identity
# ---------------------------------------------------------------------------
name:        cloudops-intelligence
version:     "0.4.0"
description: >
  CloudOps Intelligence — a dual-track multi-step cloud operations environment
  combining FinOps cost optimisation, cloud security remediation, and SOC analyst
  workflows into six progressively harder real-world tasks.

  CloudOps track: zombie EC2 cleanup (FinOps), S3/IAM misconfiguration response
  (Security + SRE), and live DDoS response with Terraform WAF deployment
  (DDoS + FinOps + SRE).

  SOC Analyst track: brute-force SSH account compromise triage, QakBot C2 beacon
  + LSASS credential dump containment, and multi-stage APT response (active C2 +
  lateral movement + S3 data exfiltration via stolen IAM credentials).

  The agent uses real threat intelligence (abuse.ch Feodo Tracker, Spamhaus DROP,
  MITRE ATT&CK), AWS CLI outputs, VPC flow logs, SIEM alerts, and Terraform to
  investigate and remediate — no game mechanics, purely text-based cognitive work.

# ---------------------------------------------------------------------------
# Runtime
# ---------------------------------------------------------------------------
type:    space
runtime: fastapi
app:     server.app:app
port:    7860

# ---------------------------------------------------------------------------
# Hardware (CPU-only — no GPU required)
# ---------------------------------------------------------------------------
hardware_tier: cpu-upgrade

# ---------------------------------------------------------------------------
# Concurrency
# ---------------------------------------------------------------------------
max_concurrent_envs: 4

# ---------------------------------------------------------------------------
# Tasks
# ---------------------------------------------------------------------------
tasks:
  - id:          easy
    description: >
      FinOps — AWS billing spike +340% ($12,400 vs $2,800 baseline).
      Three EC2 m5.2xlarge instances from a cancelled project ("ProjectPhoenix")
      have been running with 0% CPU utilisation for 32 days, burning $885/month.
      The agent must: view_billing to identify the cost spike; run_cli
      (aws ec2 describe-instances) or list_resources(ec2) to find the zombie
      fleet; apply_fix(terminate) on each instance; verify the EC2 fleet
      returns to healthy. 2 services | 1 root cause | 15 step budget.
    difficulty:  easy
    max_steps:   15
    grader:      programmatic
    score_range: [0.0, 1.0]
    grader_formula: >
      score = 0.35 × rc_ratio + 0.25 × svc_ratio + 0.20 × reward_norm + 0.20 × bonus

  - id:          medium
    description: >
      Security + SRE — A bad deployment (v4.2.0) triggered two simultaneous issues:
      (1) S3 bucket 'prod-customer-data' ACL changed to public-read-write —
      customer PII is publicly readable and writable; GDPR breach window open 3 hours.
      (2) Payment service IAM role policy has a typo ('s3:GetObejct' instead of
      's3:GetObject') — AWS silently ignores the invalid action, causing all
      payment certificate loads to fail with 403; 89% checkout error rate.
      The agent must: run_cli(aws s3api get-bucket-acl) to find the exposure;
      run_cli(aws iam get-role-policy) to find the typo; apply_fix to block
      public access; apply_fix to correct the IAM policy; verify payment service.
      5 services | 2 root causes | 25 step budget.
    difficulty:  medium
    max_steps:   25
    grader:      programmatic
    score_range: [0.0, 1.0]
    grader_formula: >
      score = 0.35 × rc_ratio + 0.25 × svc_ratio + 0.20 × reward_norm + 0.20 × bonus

  - id:          hard
    description: >
      DDoS + FinOps + SRE — A coordinated volumetric DDoS from three CIDR ranges
      (203.0.113.0/24, 198.51.100.0/24, 192.0.2.0/24) floods the API gateway at
      840,000 req/min (700× baseline). Auto-scaling responds by launching 200 extra
      EC2 instances — current cost $51,200/hr with max_capacity=500 (no ceiling).
      The attack cascades: order_service crashes (thread pool exhausted) and
      inventory_service degrades. Three root causes:
      (1) No WAF Web ACL — agent must write_terraform(aws_wafv2_web_acl) with
          IP block rules for all three malicious CIDRs and deploy it;
      (2) Auto-scaling max_capacity=500 with no DDoS protection — agent must
          apply_fix to cap max_capacity and scale in the excess instances;
      (3) No API Gateway rate limiting — agent must enable throttling.
      Agent must also analyse VPC flow logs (run_cli) to identify attack sources.
      6 services | 3 root causes | 40 step budget.
    difficulty:  hard
    max_steps:   40
    grader:      programmatic
    score_range: [0.0, 1.0]
    grader_formula: >
      score = 0.35 × rc_ratio + 0.25 × svc_ratio + 0.20 × reward_norm + 0.20 × bonus

  - id:          soc_easy
    description: >
      SOC Analyst (easy) — SIEM alert SOC-2847: 247 failed SSH logins from Tor exit node
      185.220.101.45 (Spamhaus DROP listed), 1 successful login as svc_deploy. The attacker
      runs sudo commands and attempts to download an implant. Agent must: lookup_threat_intel
      to confirm the IOC, view bastion_host logs to identify the active attacker session,
      apply_fix(revoke_session) to terminate it, and verify recovery.
      2 services | 1 root cause | 15 step budget.
    difficulty:  soc_easy
    max_steps:   15
    grader:      programmatic
    score_range: [0.0, 1.0]
    grader_formula: >
      score = 0.35 × rc_ratio + 0.25 × svc_ratio + 0.20 × reward_norm + 0.20 × bonus

  - id:          soc_medium
    description: >
      SOC Analyst (medium) — SIEM alert SOC-3991: three simultaneous rules fired — QakBot
      C2 beacon from ENG-WORKSTATION-47 to 162.243.103.246:8080 (abuse.ch Feodo Tracker,
      QakBot family), LSASS memory access (MITRE T1003.001) exposing NTLM hashes for 8
      accounts, and lateral movement probe via SMB to 10.0.2.0/24. Agent must: look up the
      C2 IP on threat intel, isolate the infected host (endpoint_security), and rotate
      all compromised AD credentials (auth_service).
      4 services | 2 root causes | 25 step budget.
    difficulty:  soc_medium
    max_steps:   25
    grader:      programmatic
    score_range: [0.0, 1.0]
    grader_formula: >
      score = 0.35 × rc_ratio + 0.25 × svc_ratio + 0.20 × reward_norm + 0.20 × bonus

  - id:          soc_hard
    description: >
      SOC Analyst (hard) — SIEM alert SOC-4128: APT multi-stage — active QakBot C2 to
      50.16.16.211:443 (ONLINE per Feodo Tracker), lateral WMI/SMB movement to 3 internal
      servers (MITRE T1021), and 2.3 GB S3 exfiltration via stolen DataScienceRole credentials
      (MITRE T1530, T1078). GuardDuty confirms UnauthorizedAccess:IAMUser/TorIPCaller. Agent
      must: verify Feodo intel, block C2 via Terraform aws_network_acl, isolate all 4 infected
      hosts, and revoke the stolen IAM role session.
      5 services | 3 root causes | 40 step budget.
    difficulty:  soc_hard
    max_steps:   40
    grader:      programmatic
    score_range: [0.0, 1.0]
    grader_formula: >
      score = 0.35 × rc_ratio + 0.25 × svc_ratio + 0.20 × reward_norm + 0.20 × bonus

# ---------------------------------------------------------------------------
# Environment variables
# ---------------------------------------------------------------------------
env:
  API_BASE_URL:
    description: "OpenAI-compatible LLM API base URL (default: https://api.openai.com/v1)"
    required: false
    default: "https://api.openai.com/v1"
  MODEL_NAME:
    description: "LLM model identifier (default: gpt-4o-mini)"
    required: false
    default: "gpt-4o-mini"
  HF_TOKEN:
    description: "Bearer token / API key for the LLM endpoint (HF Spaces secret)"
    required: true
  OPENENV_ENDPOINT:
    description: "Base URL of this environment server (default: http://localhost:7860)"
    required: false
    default: "http://localhost:7860"
